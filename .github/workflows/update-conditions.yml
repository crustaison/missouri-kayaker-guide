name: Update River Conditions

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch USGS gauge data
        run: |
          python3 - << 'EOF'
          import json, urllib.request, datetime

          with open('data/rivers.json') as f:
              rivers = json.load(f)

          site_ids = [r['usgs'] for r in rivers if r.get('usgs')]
          sites_param = ','.join(site_ids)

          url = (
              'https://waterservices.usgs.gov/nwis/iv/'
              f'?sites={sites_param}'
              '&parameterCd=00060,00065'
              '&format=json'
              '&siteStatus=active'
          )

          req = urllib.request.Request(url, headers={'User-Agent': 'missouri-kayaker-guide/1.0'})
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.load(resp)

          # Parse into {site_id: {level, flow}}
          readings = {}
          for ts in data['value']['timeSeries']:
              site_id = ts['sourceInfo']['siteCode'][0]['value']
              param = ts['variable']['variableCode'][0]['value']
              values = ts['values'][0]['value']
              if values:
                  val = float(values[-1]['value']) if values[-1]['value'] != '-999999' else None
                  if site_id not in readings:
                      readings[site_id] = {}
                  if param == '00065':
                      readings[site_id]['level'] = val
                  elif param == '00060':
                      readings[site_id]['flow'] = val

          # Build conditions with auto safe/warning/danger
          conditions = {}
          for river in rivers:
              usgs = river.get('usgs')
              if not usgs:
                  continue
              r = readings.get(usgs, {})
              level = r.get('level')
              flow = r.get('flow')
              flood_stage = river.get('flood_stage', 10.0)

              if level is not None and flood_stage:
                  pct = level / flood_stage
                  if pct >= 0.85:
                      status = 'danger'
                      label = 'Danger'
                  elif pct >= 0.55:
                      status = 'warning'
                      label = 'Caution'
                  else:
                      status = 'safe'
                      label = 'Good'
              else:
                  status = 'unknown'
                  label = 'No Data'

              conditions[river['id']] = {
                  'level': level,
                  'flow': flow,
                  'flood_stage': flood_stage,
                  'pct': round((level / flood_stage * 100), 1) if level and flood_stage else None,
                  'status': status,
                  'label': label,
              }

          output = {
              'updated': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'conditions': conditions,
          }

          with open('data/conditions.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Updated {len(conditions)} rivers")
          EOF

      - name: Commit updated conditions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/conditions.json
          git diff --staged --quiet || git commit -m "chore: update river conditions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
